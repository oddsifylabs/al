version: '3.8'

services:
  # PostgreSQL — Shared Kanban database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: al_hub
      POSTGRES_USER: al
      POSTGRES_PASSWORD: al_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - al-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U al -d al_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AL Dashboard — Central Hub
  al-dashboard:
    build:
      context: ../../al-dashboard
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://al:al_secret@postgres:5432/al_hub
      FLASK_ENV: production
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - al-network

  # Jed Manager Poller
  jed-manager:
    build:
      context: ../../al-manager
      dockerfile: Dockerfile
    environment:
      DASHBOARD_URL: http://al-dashboard:8080
      POLL_INTERVAL: 30
    depends_on:
      - al-dashboard
    networks:
      - al-network

  # Worker Pollers (enable the ones you need)
  # ruth-worker:
  #   build:
  #     context: ../../al-workers
  #     dockerfile: Dockerfile
  #   environment:
  #     WORKER_ID: ruth
  #     DASHBOARD_URL: http://al-dashboard:8080
  #     POLL_INTERVAL: 30
  #   depends_on:
  #     - al-dashboard
  #   networks:
  #     - al-network

volumes:
  postgres_data:

networks:
  al-network:
    driver: bridge
