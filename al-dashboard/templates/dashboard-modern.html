<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AL Workforce Dashboard | Oddsify Labs</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ============================================
       DESIGN TOKENS — Modern Dark Theme
       ============================================ */
    :root {
      /* Typography Scale */
      --text-xs: 11px;
      --text-sm: 12px;
      --text-base: 14px;
      --text-lg: 16px;
      --text-xl: 18px;
      --text-2xl: 20px;
      --text-3xl: 24px;
      --text-4xl: 32px;
      --text-5xl: 40px;
      
      /* Font Families */
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      
      /* Font Weights */
      --font-normal: 400;
      --font-medium: 500;
      --font-semibold: 600;
      --font-bold: 700;
      --font-extrabold: 800;
      
      /* Icon Sizes */
      --icon-xs: 14px;
      --icon-sm: 16px;
      --icon-md: 18px;
      --icon-lg: 20px;
      --icon-xl: 24px;
      --icon-2xl: 28px;
      --icon-3xl: 32px;
      
      /* Spacing */
      --spacing-1: 4px;
      --spacing-2: 8px;
      --spacing-3: 12px;
      --spacing-4: 16px;
      --spacing-5: 20px;
      --spacing-6: 24px;
      --spacing-8: 32px;
      --spacing-10: 40px;
      --spacing-12: 48px;
      --spacing-16: 64px;
      
      /* Border Radius */
      --radius-sm: 6px;
      --radius: 8px;
      --radius-md: 10px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-2xl: 20px;
      --radius-full: 9999px;
      
      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.6);
      --shadow-glow: 0 0 20px rgba(77, 208, 255, 0.3);
      
      /* Transitions */
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    [data-theme="dark"] {
      /* Core Colors — Void Black Canvas */
      --void: #0a0a0f;
      --void-light: #0f0f16;
      --surface: #12121a;
      --surface-hover: #1a1a25;
      --surface-active: #222230;
      
      /* Text Colors */
      --text: #fafafa;
      --text-secondary: #a0a0b0;
      --text-tertiary: #6a6a7a;
      --text-inverse: #0a0a0f;
      
      /* Border Colors */
      --border: rgba(255, 255, 255, 0.08);
      --border-light: rgba(255, 255, 255, 0.05);
      --border-strong: rgba(255, 255, 255, 0.15);
      
      /* Accent Colors — Cyan/Blue Primary */
      --accent: #4dd0ff;
      --accent-hover: #66d9ff;
      --accent-dim: rgba(77, 208, 255, 0.08);
      --accent-glow: rgba(77, 208, 255, 0.3);
      
      /* Status Colors */
      --success: #00d68f;
      --success-dim: rgba(0, 214, 143, 0.08);
      --success-glow: rgba(0, 214, 143, 0.3);
      
      --warning: #ffb020;
      --warning-dim: rgba(255, 176, 32, 0.08);
      --warning-glow: rgba(255, 176, 32, 0.3);
      
      --error: #ff4757;
      --error-dim: rgba(255, 71, 87, 0.08);
      --error-glow: rgba(255, 71, 87, 0.3);
      
      --info: #5375f9;
      --info-dim: rgba(83, 117, 249, 0.08);
      --info-glow: rgba(83, 117, 249, 0.3);
      
      /* Worker Role Colors */
      --role-manager: #a855f7;
      --role-coder: #3b82f6;
      --role-web: #06b6d4;
      --role-admin: #f59e0b;
      --role-marketing: #ec4899;
      --role-social: #8b5cf6;
    }
    
    /* ============================================
       BASE STYLES
       ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      color: var(--text);
      background: var(--void);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
    }
    
    /* Background Effects */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(77, 208, 255, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 85% 75%, rgba(168, 85, 247, 0.03) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(0, 214, 143, 0.02) 0%, transparent 50%);
      animation: ambientDrift 24s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at center, rgba(77, 208, 255, 0.03) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px, 80px 80px, 80px 80px;
      opacity: 0.6;
      pointer-events: none;
      z-index: 0;
    }
    
    @keyframes ambientDrift {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 1; }
      33% { transform: translate(2%, -1%) scale(1.05); opacity: 0.8; }
      66% { transform: translate(-1%, 2%) scale(0.95); opacity: 0.9; }
    }
    
    /* ============================================
       LAYOUT
       ============================================ */
    .app-container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 var(--spacing-6);
    }
    
    /* ============================================
       HEADER — Worker Status Bar
       ============================================ */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: var(--spacing-4) 0;
      margin-bottom: var(--spacing-8);
    }
    
    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-6);
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
    }
    
    .brand-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--info) 100%);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: var(--font-extrabold);
      font-size: var(--text-lg);
      color: var(--text-inverse);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    
    .brand-name {
      font-size: var(--text-lg);
      font-weight: var(--font-bold);
      letter-spacing: var(--tracking-tighter);
    }
    
    .brand-subtitle {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    
    /* Worker Status Bar */
    .worker-status-bar {
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
      flex: 1;
      justify-content: center;
    }
    
    .worker-status-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
      padding: var(--spacing-2) var(--spacing-3);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--font-medium);
      transition: all var(--transition);
      cursor: pointer;
    }
    
    .worker-status-item:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }
    
    .worker-avatar {
      width: 20px;
      height: 20px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xs);
      font-weight: var(--font-bold);
      color: white;
    }
    
    .worker-status-dot {
      width: 6px;
      height: 6px;
      border-radius: var(--radius-full);
      background: var(--success);
      box-shadow: 0 0 8px var(--success-glow);
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }
    
    /* Header Actions */
    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
    }
    
    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
    }
    
    .btn-icon:hover {
      background: var(--surface-hover);
      color: var(--text);
      border-color: var(--accent);
    }
    
    /* ============================================
       TABS
       ============================================ */
    .tabs {
      display: flex;
      gap: var(--spacing-2);
      margin-bottom: var(--spacing-8);
      background: var(--surface);
      padding: var(--spacing-2);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
    }
    
    .tab {
      flex: 1;
      padding: var(--spacing-3) var(--spacing-4);
      background: transparent;
      border: none;
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-2);
      position: relative;
      overflow: hidden;
    }
    
    .tab::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      transform: translateX(-50%);
      transition: width var(--transition);
    }
    
    .tab:hover {
      color: var(--text);
      background: var(--surface-hover);
    }
    
    .tab:hover::before {
      width: 60%;
    }
    
    .tab.active {
      color: var(--accent);
      background: var(--accent-dim);
    }
    
    .tab.active::before {
      width: 100%;
    }
    
    .tab .icon {
      width: var(--icon-sm);
      height: var(--icon-sm);
      opacity: 0.6;
      transition: all var(--transition);
    }
    
    .tab:hover .icon,
    .tab.active .icon {
      opacity: 1;
      transform: scale(1.1);
    }
    
    /* ============================================
       STATS GRID
       ============================================ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: var(--spacing-4);
      margin-bottom: var(--spacing-8);
    }
    
    .stat-card {
      position: relative;
      padding: var(--spacing-5);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: all var(--transition-slow);
      cursor: pointer;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      transition: left 0.6s ease;
    }
    
    .stat-card:hover::before {
      left: 100%;
    }
    
    .stat-card::after {
      content: '';
      position: absolute;
      inset: -2px;
      background: radial-gradient(
        600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        rgba(77, 208, 255, 0.06),
        transparent 40%
      );
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
      z-index: 1;
    }
    
    .stat-card:hover {
      border-color: var(--accent);
      box-shadow: 
        0 8px 32px rgba(77, 208, 255, 0.12),
        0 0 0 1px rgba(77, 208, 255, 0.1);
      transform: translateY(-4px) scale(1.02);
    }
    
    .stat-card:hover::after {
      opacity: 1;
    }
    
    .stat-card.success {
      background: linear-gradient(135deg, rgba(0, 214, 143, 0.08) 0%, var(--surface) 100%);
      border-color: rgba(0, 214, 143, 0.2);
    }
    
    .stat-card.error {
      background: linear-gradient(135deg, rgba(255, 71, 87, 0.08) 0%, var(--surface) 100%);
      border-color: rgba(255, 71, 87, 0.2);
    }
    
    .stat-card.warning {
      background: linear-gradient(135deg, rgba(255, 176, 32, 0.08) 0%, var(--surface) 100%);
      border-color: rgba(255, 176, 32, 0.2);
    }
    
    .stat-card.info {
      background: linear-gradient(135deg, rgba(83, 117, 249, 0.08) 0%, var(--surface) 100%);
      border-color: rgba(83, 117, 249, 0.2);
    }
    
    .stat-card-label {
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
      margin-bottom: var(--spacing-3);
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }
    
    .stat-card-label .icon {
      width: var(--icon-sm);
      height: var(--icon-sm);
      opacity: 0.8;
    }
    
    .stat-card-value {
      font-family: var(--font-mono);
      font-size: var(--text-4xl);
      font-weight: var(--font-extrabold);
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: var(--spacing-2);
    }
    
    .stat-card.success .stat-card-value {
      color: var(--success);
      text-shadow: 0 0 20px var(--success-glow);
    }
    
    .stat-card.error .stat-card-value {
      color: var(--error);
      text-shadow: 0 0 20px var(--error-glow);
    }
    
    .stat-card.warning .stat-card-value {
      color: var(--warning);
      text-shadow: 0 0 20px var(--warning-glow);
    }
    
    .stat-card.info .stat-card-value {
      color: var(--info);
      text-shadow: 0 0 20px var(--info-glow);
    }
    
    .stat-card-detail {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }
    
    /* ============================================
       SECTIONS
       ============================================ */
    .section {
      margin-bottom: var(--spacing-8);
      animation: fadeInUp 400ms ease-out backwards;
    }
    
    .section:nth-child(1) { animation-delay: 80ms; }
    .section:nth-child(2) { animation-delay: 160ms; }
    .section:nth-child(3) { animation-delay: 240ms; }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .section-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
      margin-bottom: var(--spacing-5);
      font-size: var(--text-lg);
      font-weight: var(--font-bold);
      color: var(--text);
    }
    
    .section-header .icon {
      width: var(--icon-lg);
      height: var(--icon-lg);
      color: var(--accent);
      filter: drop-shadow(0 0 8px var(--accent-glow));
    }
    
    /* ============================================
       KANBAN BOARD
       ============================================ */
    .kanban-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-4);
    }
    
    .kanban-column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-4);
      min-height: 400px;
    }
    
    .kanban-column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-4);
      padding-bottom: var(--spacing-3);
      border-bottom: 2px solid var(--border);
    }
    
    .kanban-column-title {
      font-size: var(--text-sm);
      font-weight: var(--font-bold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
    }
    
    .kanban-count {
      background: var(--surface-hover);
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      font-family: var(--font-mono);
    }
    
    .kanban-column.todo .kanban-column-title { color: var(--text-secondary); }
    .kanban-column.in-progress .kanban-column-title { color: var(--warning); }
    .kanban-column.done .kanban-column-title { color: var(--success); }
    
    .kanban-card {
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--spacing-3);
      margin-bottom: var(--spacing-3);
      cursor: pointer;
      transition: all var(--transition);
    }
    
    .kanban-card:hover {
      border-color: var(--accent);
      transform: translateX(4px);
      box-shadow: var(--shadow);
    }
    
    .kanban-card-title {
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      margin-bottom: var(--spacing-2);
    }
    
    .kanban-card-meta {
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }
    
    .kanban-assignee {
      display: flex;
      align-items: center;
      gap: var(--spacing-1);
    }
    
    .kanban-assignee-avatar {
      width: 16px;
      height: 16px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: var(--font-bold);
      color: white;
    }
    
    /* ============================================
       WORKER PROFILES PAGE
       ============================================ */
    .worker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--spacing-5);
    }
    
    .worker-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-6);
      transition: all var(--transition-slow);
      cursor: pointer;
    }
    
    .worker-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    
    .worker-card-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-4);
      margin-bottom: var(--spacing-4);
    }
    
    .worker-card-avatar {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-2xl);
      font-weight: var(--font-extrabold);
      color: white;
      box-shadow: var(--shadow-md);
    }
    
    .worker-card-info h3 {
      font-size: var(--text-lg);
      font-weight: var(--font-bold);
      margin-bottom: var(--spacing-1);
    }
    
    .worker-card-role {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      font-weight: var(--font-medium);
    }
    
    .worker-card-status {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-2);
      padding: var(--spacing-1) var(--spacing-3);
      background: var(--success-dim);
      border: 1px solid rgba(0, 214, 143, 0.2);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      color: var(--success);
    }
    
    .worker-card-status-dot {
      width: 6px;
      height: 6px;
      border-radius: var(--radius-full);
      background: var(--success);
      animation: pulse 2s ease-in-out infinite;
    }
    
    .worker-card-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-3);
      margin-top: var(--spacing-4);
      padding-top: var(--spacing-4);
      border-top: 1px solid var(--border);
    }
    
    .worker-stat {
      text-align: center;
    }
    
    .worker-stat-value {
      font-family: var(--font-mono);
      font-size: var(--text-xl);
      font-weight: var(--font-bold);
      color: var(--accent);
    }
    
    .worker-stat-label {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    /* ============================================
       BUTTONS
       ============================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-2);
      padding: var(--spacing-3) var(--spacing-5);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: all var(--transition);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--info) 100%);
      color: var(--text-inverse);
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }
    
    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
    }
    
    /* ============================================
       ICONS
       ============================================ */
    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    
    /* ============================================
       UTILITIES
       ============================================ */
    .hidden {
      display: none !important;
    }
    
    .text-center {
      text-align: center;
    }
    
    .mt-4 { margin-top: var(--spacing-4); }
    .mt-6 { margin-top: var(--spacing-6); }
    .mb-4 { margin-bottom: var(--spacing-4); }
    .mb-6 { margin-bottom: var(--spacing-6); }
    
    /* ============================================
       MODAL
       ============================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all var(--transition);
    }
    
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--spacing-6);
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.95);
      transition: all var(--transition);
    }
    
    .modal-overlay.active .modal {
      transform: scale(1);
    }
    
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-5);
    }
    
    .modal-title {
      font-size: var(--text-xl);
      font-weight: var(--font-bold);
    }
    
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface-hover);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
    }
    
    .modal-close:hover {
      background: var(--error);
      color: white;
      border-color: var(--error);
    }
    
    /* ============================================
       FORM ELEMENTS
       ============================================ */
    .form-group {
      margin-bottom: var(--spacing-4);
    }
    
    .form-label {
      display: block;
      margin-bottom: var(--spacing-2);
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      color: var(--text-secondary);
    }
    
    .form-input {
      width: 100%;
      padding: var(--spacing-3);
      background: var(--surface-hover);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      transition: all var(--transition);
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    
    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- HEADER with Worker Status Bar -->
    <header class="header">
      <div class="header-content">
        <div class="brand">
          <div class="brand-logo">AL</div>
          <div>
            <div class="brand-name">AL Workforce</div>
            <div class="brand-subtitle">Oddsify Labs</div>
          </div>
        </div>
        
        <!-- Worker Status Bar -->
        <div class="worker-status-bar" id="workerStatusBar">
          <!-- Populated by JavaScript -->
        </div>
        
        <div class="header-actions">
          <button class="btn-icon" onclick="refreshData()" title="Refresh">
            <svg class="icon icon-sm" viewBox="0 0 24 24">
              <path d="M23 4v6h-6M1 20v-6h6"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
          <button class="btn-icon" onclick="openSettings()" title="Settings">
            <svg class="icon icon-sm" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>
    
    <!-- TABS -->
    <nav class="tabs">
      <button class="tab active" onclick="switchTab('dashboard')">
        <svg class="icon" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </button>
      <button class="tab" onclick="switchTab('workers')">
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Workers
      </button>
      <button class="tab" onclick="switchTab('kanban')">
        <svg class="icon" viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 3v18"/>
          <path d="M15 3v18"/>
        </svg>
        Kanban
      </button>
      <button class="tab" onclick="switchTab('settings')">
        <svg class="icon" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
      </button>
    </nav>
    
    <!-- DASHBOARD TAB -->
    <div id="dashboard-tab" class="tab-content">
      <!-- Stats Grid -->
      <div class="stats-grid" id="statsGrid">
        <!-- Populated by JavaScript -->
      </div>
      
      <!-- Kanban Preview -->
      <section class="section">
        <h2 class="section-header">
          <svg class="icon" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M9 3v18"/>
            <path d="M15 3v18"/>
          </svg>
          Recent Tasks
        </h2>
        <div class="kanban-board" id="kanbanPreview">
          <!-- Populated by JavaScript -->
        </div>
      </section>
    </div>
    
    <!-- WORKERS TAB -->
    <div id="workers-tab" class="tab-content hidden">
      <section class="section">
        <h2 class="section-header">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Workforce Profiles
        </h2>
        <div class="worker-grid" id="workerGrid">
          <!-- Populated by JavaScript -->
        </div>
      </section>
    </div>
    
    <!-- KANBAN TAB -->
    <div id="kanban-tab" class="tab-content hidden">
      <section class="section">
        <h2 class="section-header">
          <svg class="icon" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M9 3v18"/>
            <path d="M15 3v18"/>
          </svg>
          Task Board
        </h2>
        <div class="kanban-board" id="fullKanban">
          <!-- Populated by JavaScript -->
        </div>
      </section>
    </div>
    
    <!-- SETTINGS TAB -->
    <div id="settings-tab" class="tab-content hidden">
      <section class="section">
        <h2 class="section-header">
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          System Settings
        </h2>
        <div class="section">
          <h3>Activity Logs</h3>
          <div id="activityLogs" style="margin-top: 16px;">
            <!-- Populated by JavaScript -->
          </div>
        </div>
      </section>
    </div>
  </div>
  
  <!-- Worker Profile Modal -->
  <div class="modal-overlay" id="workerModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalWorkerName">Worker Profile</h3>
        <button class="modal-close" onclick="closeWorkerModal()">
          <svg class="icon icon-sm" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="modalWorkerContent">
        <!-- Populated by JavaScript -->
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // DATA & STATE
    // ============================================
    const workers = [
      { id: 'jed', name: 'Jed', role: 'Manager/Orchestrator', status: 'online', service: 'jed---the-manager', color: '#a855f7', avatar: '🎯' },
      { id: 'ruth', name: 'Ruth', role: 'Coder', status: 'online', service: 'hermes-agent-edcb', color: '#3b82f6', avatar: '💻' },
      { id: 'ms-anderson', name: 'Ms. Anderson', role: 'Web Dev', status: 'online', service: 'hermes-agent-14cf', color: '#06b6d4', avatar: '🎨' },
      { id: 'octavia', name: 'Octavia', role: 'Admin/Writer', status: 'online', service: 'hermes-agent', color: '#f59e0b', avatar: '📝' },
      { id: 'mitch', name: 'Mitch', role: 'Marketing/Sales', status: 'online', service: 'hermes-agent-7a4a', color: '#ec4899', avatar: '📈' },
      { id: 'malcom', name: 'Malcom', role: 'Social Media', status: 'online', service: 'hermes-agent-3940', color: '#8b5cf6', avatar: '📱' }
    ];
    
    let tasks = [];
    let stats = { total: 0, todo: 0, in_progress: 0, done: 0 };
    
    // ============================================
    // INITIALIZATION
    // ============================================
    async function init() {
      await loadData();
      renderWorkerStatusBar();
      renderStats();
      renderKanbanPreview();
      renderWorkerGrid();
      renderActivityLogs();
      setupMouseTracking();
    }
    
    async function loadData() {
      try {
        const [statsRes, tasksRes] = await Promise.all([
          fetch('/api/stats'),
          fetch('/api/tasks')
        ]);
        
        const statsData = await statsRes.json();
        const tasksData = await tasksRes.json();
        
        if (statsData.success) stats = statsData.stats;
        if (tasksData.success) tasks = tasksData.tasks || [];
      } catch (error) {
        console.error('Failed to load data:', error);
      }
    }
    
    // ============================================
    // RENDERING
    // ============================================
    function renderWorkerStatusBar() {
      const container = document.getElementById('workerStatusBar');
      container.innerHTML = workers.map(w => `
        <div class="worker-status-item" onclick="showWorkerProfile('${w.id}')">
          <div class="worker-avatar" style="background: ${w.color}">${w.name.charAt(0)}</div>
          <span>${w.name}</span>
          <div class="worker-status-dot"></div>
        </div>
      `).join('');
    }
    
    function renderStats() {
      const container = document.getElementById('statsGrid');
      container.innerHTML = `
        <div class="stat-card info">
          <div class="stat-card-label">
            <svg class="icon" viewBox="0 0 24 24">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M9 3v18"/>
              <path d="M15 3v18"/>
            </svg>
            Total Tasks
          </div>
          <div class="stat-card-value">${stats.total}</div>
          <div class="stat-card-detail">All time</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-card-label">
            <svg class="icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            To Do
          </div>
          <div class="stat-card-value">${stats.todo}</div>
          <div class="stat-card-detail">Pending</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-card-label">
            <svg class="icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            In Progress
          </div>
          <div class="stat-card-value">${stats.in_progress}</div>
          <div class="stat-card-detail">Active</div>
        </div>
        <div class="stat-card success">
          <div class="stat-card-label">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            Done
          </div>
          <div class="stat-card-value">${stats.done}</div>
          <div class="stat-card-detail">Completed</div>
        </div>
      `;
    }
    
    function renderKanbanPreview() {
      const container = document.getElementById('kanbanPreview');
      const recentTasks = tasks.slice(0, 6);
      
      container.innerHTML = `
        <div class="kanban-column todo">
          <div class="kanban-column-header">
            <div class="kanban-column-title">
              <svg class="icon icon-sm" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
              To Do
              <span class="kanban-count">${stats.todo}</span>
            </div>
          </div>
          ${recentTasks.filter(t => t.status === 'todo').map(task => renderKanbanCard(task)).join('')}
        </div>
        <div class="kanban-column in-progress">
          <div class="kanban-column-header">
            <div class="kanban-column-title">
              <svg class="icon icon-sm" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
              </svg>
              In Progress
              <span class="kanban-count">${stats.in_progress}</span>
            </div>
          </div>
          ${recentTasks.filter(t => t.status === 'in_progress').map(task => renderKanbanCard(task)).join('')}
        </div>
        <div class="kanban-column done">
          <div class="kanban-column-header">
            <div class="kanban-column-title">
              <svg class="icon icon-sm" viewBox="0 0 24 24">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
              Done
              <span class="kanban-count">${stats.done}</span>
            </div>
          </div>
          ${recentTasks.filter(t => t.status === 'done').map(task => renderKanbanCard(task)).join('')}
        </div>
      `;
    }
    
    function renderKanbanCard(task) {
      const assignee = workers.find(w => w.name === task.assignee);
      return `
        <div class="kanban-card">
          <div class="kanban-card-title">${task.title}</div>
          <div class="kanban-card-meta">
            ${assignee ? `
              <div class="kanban-assignee">
                <div class="kanban-assignee-avatar" style="background: ${assignee.color}">${assignee.name.charAt(0)}</div>
                <span>${assignee.name}</span>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }
    
    function renderWorkerGrid() {
      const container = document.getElementById('workerGrid');
      container.innerHTML = workers.map(w => {
        const workerTasks = tasks.filter(t => t.assignee === w.name);
        const activeTasks = workerTasks.filter(t => t.status === 'in_progress').length;
        const doneTasks = workerTasks.filter(t => t.status === 'done').length;
        
        return `
          <div class="worker-card" onclick="showWorkerProfile('${w.id}')">
            <div class="worker-card-header">
              <div class="worker-card-avatar" style="background: ${w.color}">${w.avatar}</div>
              <div class="worker-card-info">
                <h3>${w.name}</h3>
                <div class="worker-card-role">${w.role}</div>
              </div>
            </div>
            <div class="worker-card-status">
              <div class="worker-card-status-dot"></div>
              ${w.status}
            </div>
            <div class="worker-card-stats">
              <div class="worker-stat">
                <div class="worker-stat-value">${workerTasks.length}</div>
                <div class="worker-stat-label">Total</div>
              </div>
              <div class="worker-stat">
                <div class="worker-stat-value">${activeTasks}</div>
                <div class="worker-stat-label">Active</div>
              </div>
              <div class="worker-stat">
                <div class="worker-stat-value">${doneTasks}</div>
                <div class="worker-stat-label">Done</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function renderActivityLogs() {
      const container = document.getElementById('activityLogs');
      const logs = [
        { time: '2 min ago', event: 'Task created', details: 'Malcom assigned new social media task' },
        { time: '15 min ago', event: 'System update', details: 'Dashboard UI modernized' },
        { time: '1 hour ago', event: 'Worker online', details: 'All 6 workers connected' },
        { time: '2 hours ago', event: 'Task completed', details: 'Jed processed 3 tasks' }
      ];
      
      container.innerHTML = logs.map(log => `
        <div style="display: flex; gap: 12px; padding: 12px; background: var(--surface-hover); border-radius: var(--radius); margin-bottom: 8px;">
          <div style="flex: 1">
            <div style="font-weight: 600; font-size: 13px;">${log.event}</div>
            <div style="font-size: 12px; color: var(--text-secondary);">${log.details}</div>
          </div>
          <div style="font-size: 11px; color: var(--text-tertiary);">${log.time}</div>
        </div>
      `).join('');
    }
    
    // ============================================
    // INTERACTIONS
    // ============================================
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
      
      event.target.closest('.tab').classList.add('active');
      document.getElementById(`${tabName}-tab`).classList.remove('hidden');
    }
    
    function showWorkerProfile(workerId) {
      const worker = workers.find(w => w.id === workerId);
      if (!worker) return;
      
      document.getElementById('modalWorkerName').textContent = worker.name;
      document.getElementById('modalWorkerContent').innerHTML = `
        <div style="text-align: center; margin-bottom: 24px;">
          <div style="width: 80px; height: 80px; margin: 0 auto 16px; background: ${worker.color}; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px;">
            ${worker.avatar}
          </div>
          <h3 style="font-size: 20px; margin-bottom: 4px;">${worker.name}</h3>
          <p style="color: var(--text-secondary);">${worker.role}</p>
        </div>
        <div style="display: grid; gap: 16px;">
          <div class="form-group">
            <label class="form-label">Service</label>
            <input class="form-input" value="${worker.service}" readonly>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <input class="form-input" value="${worker.status}" readonly>
          </div>
          <button class="btn btn-primary" onclick="alert('Edit feature coming soon!')">
            <svg class="icon icon-sm" viewBox="0 0 24 24">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Edit Profile
          </button>
        </div>
      `;
      
      document.getElementById('workerModal').classList.add('active');
    }
    
    function closeWorkerModal() {
      document.getElementById('workerModal').classList.remove('active');
    }
    
    function openSettings() {
      switchTab('settings');
    }
    
    function refreshData() {
      loadData().then(() => {
        renderStats();
        renderKanbanPreview();
        renderWorkerGrid();
      });
    }
    
    function setupMouseTracking() {
      document.addEventListener('mousemove', (e) => {
        document.querySelectorAll('.stat-card:hover').forEach(card => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          card.style.setProperty('--mouse-x', `${x}px`);
          card.style.setProperty('--mouse-y', `${y}px`);
        });
      });
    }
    
    // Close modal on overlay click
    document.getElementById('workerModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeWorkerModal();
    });
    
    // Initialize on load
    init();
  </script>
</body>
</html>
