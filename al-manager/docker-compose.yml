services:
  # AL Dashboard
  al-dashboard:
    build:
      context: ../al-dashboard
      dockerfile: Dockerfile
    environment:
      - HERMES_HOME=/root/.hermes
      - AL_MANAGER_PROFILE=jed-hermes
      - FLASK_ENV=production
      - PORT=8080
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - al-network

volumes:
  hermes_data:

networks:
  al-network:
    driver: bridge
