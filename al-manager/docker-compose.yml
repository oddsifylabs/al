version: '3.8'

services:
  # AL Dashboard
  al-dashboard:
    build:
      context: ../al-dashboard
      dockerfile: Dockerfile
    environment:
      - HERMES_HOME=/root/.hermes
      - AL_MANAGER_PROFILE=jed-hermes
      - FLASK_ENV=production
      - PORT=8080
    volumes:
      # Mount your Hermes profiles from Windows (read-only for safety)
      # Replace C:\Users\Jesse C with your actual Windows username path
      - C:\Users\Jesse C\.hermes:/root/.hermes:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - al-network

volumes:
  hermes_data:

networks:
  al-network:
    driver: bridge
